name: kennie
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  auto_size_text: ^3.0.0
  audioplayers: ^6.5.1
  bonfire: ^3.17.0
  flame: ^1.18.0
  flame_tiled: ^1.18.4
  nes_ui: ^0.30.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  tiled: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bgm/
    - assets/images/
    - assets/images/solaria/
    - assets/images/npc/
    - assets/images/player/
    - assets/images/enemy/
    - assets/images/tiled/punnyworld/
  # Optional: to use a bundled pixel font, add the TTF at
  # assets/fonts/PressStart2P-Regular.ttf and uncomment the `fonts` section.
